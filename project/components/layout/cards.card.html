<!-- @dsCard group="Components" viewport="700x400" name="Cards & Containers" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Component</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYyWkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    body {
      padding: 2rem;
      background: var(--bg-primary);
    }
    .demo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    .demo-section {
      margin-bottom: 2rem;
    }
    .demo-title {
      font-size: var(--font-size-sm);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide);
      margin-bottom: 1rem;
      font-weight: var(--font-weight-semibold);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Card } = window.DesignSystem_776417;

    function CardDemo() {
      return (
        <div>
          <div className="demo-section">
            <div className="demo-title">Default (Shadow)</div>
            <div className="demo-grid">
              <Card padding="sm">
                <h3>Small Padding</h3>
                <p>Compact card with minimal internal spacing</p>
              </Card>
              <Card padding="md">
                <h3>Medium Padding</h3>
                <p>Standard spacing for most use cases</p>
              </Card>
              <Card padding="lg">
                <h3>Large Padding</h3>
                <p>Premium spacing for featured content</p>
              </Card>
              <Card clickable padding="md">
                <h3>Clickable</h3>
                <p>Hover to see lift effect</p>
              </Card>
            </div>
          </div>

          <div className="demo-section">
            <div className="demo-title">Bordered Variant</div>
            <Card variant="bordered" padding="md">
              <h3>Bordered Card</h3>
              <p>Subtle border instead of shadow — minimal elevation</p>
            </Card>
          </div>

          <div className="demo-section">
            <div className="demo-title">Flat Variant</div>
            <Card variant="flat" padding="md">
              <h3>Flat Card</h3>
              <p>No shadow, no border — purely structural container</p>
            </Card>
          </div>
        </div>
      );
    }

    ReactDOM.render(<CardDemo />, document.getElementById('root'));
  </script>
</body>
</html>
