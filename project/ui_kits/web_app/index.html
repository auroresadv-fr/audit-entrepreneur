<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concierge - Audit Platform</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    .app-container {
      display: flex;
      height: 100vh;
      background: var(--bg-primary);
    }
    .sidebar {
      width: 260px;
      background: var(--color-black);
      color: var(--text-inverse);
      padding: var(--space-6);
      border-right: 1px solid var(--border-primary);
      display: flex;
      flex-direction: column;
      gap: var(--space-6);
    }
    .logo-section {
      font-size: var(--font-size-h4);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--space-4);
    }
    .sidebar-menu {
      list-style: none;
      padding: 0;
      margin: 0;
      flex: 1;
    }
    .sidebar-menu li {
      margin-bottom: var(--space-3);
    }
    .sidebar-menu a {
      display: flex;
      align-items: center;
      gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-radius: var(--radius-md);
      color: var(--text-inverse);
      font-size: var(--font-size-sm);
      transition: background-color var(--transition-base);
    }
    .sidebar-menu a:hover, .sidebar-menu a.active {
      background-color: var(--accent-primary);
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-primary);
      padding: var(--space-6);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header-title { font-size: var(--font-size-h3); font-weight: var(--font-weight-bold); }
    .header-user {
      display: flex;
      align-items: center;
      gap: var(--space-4);
    }
    .avatar {
      width: 40px;
      height: 40px;
      border-radius: var(--radius-full);
      background: var(--accent-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-inverse);
      font-weight: var(--font-weight-bold);
    }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-8);
    }
    .question-card {
      background: var(--bg-secondary);
      padding: var(--space-8);
      border-radius: var(--radius-lg);
      margin-bottom: var(--space-6);
      border: 1px solid var(--border-primary);
    }
    .question-card h3 { margin-top: 0; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--border-secondary);
      border-radius: var(--radius-full);
      margin-bottom: var(--space-6);
    }
    .progress-fill {
      height: 100%;
      background: var(--accent-primary);
      border-radius: var(--radius-full);
      width: 45%;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
    }
    .option-btn {
      padding: var(--space-4);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      cursor: pointer;
      transition: all var(--transition-base);
      text-align: left;
      font-size: var(--font-size-sm);
    }
    .option-btn:hover {
      border-color: var(--accent-primary);
      background: var(--accent-primary-light);
    }
    .bottom-actions {
      display: flex;
      gap: var(--space-4);
      margin-top: var(--space-6);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Badge } = window.DesignSystem_776417;

    function AuditApp() {
      const [currentQuestion, setCurrentQuestion] = React.useState(0);
      const questions = [
        "Quel est votre style de leadership principal ?",
        "Quels sont vos objectifs business prioritaires ?",
        "Comment mesurez-vous votre succès ?",
        "Quel est votre profil entrepreneurial ?",
      ];

      return (
        <div className="app-container">
          {/* Sidebar */}
          <aside className="sidebar">
            <div className="logo-section">🎯 CONCIERGE</div>
            <ul className="sidebar-menu">
              <li><a href="#" className="active">📊 Audit en cours</a></li>
              <li><a href="#">📈 Résultats</a></li>
              <li><a href="#">💬 Sessions 1-to-1</a></li>
              <li><a href="#">⚙️ Paramètres</a></li>
            </ul>
            <div style={{ paddingTop: "var(--space-6)", borderTop: "1px solid rgba(255,255,255,0.1)" }}>
              <a href="#" style={{ color: "var(--text-inverse)" }}>Se déconnecter</a>
            </div>
          </aside>

          {/* Main Content */}
          <div className="main-content">
            <header className="header">
              <div className="header-title">Audit Personnalisé</div>
              <div className="header-user">
                <span style={{ fontSize: "var(--font-size-sm)", color: "var(--text-secondary)" }}>Étape 2/4</span>
                <div className="avatar">JD</div>
              </div>
            </header>

            <div className="content">
              <div className="progress-bar">
                <div className="progress-fill"></div>
              </div>

              <div className="question-card">
                <Badge>Question {currentQuestion + 1}/4</Badge>
                <h3>{questions[currentQuestion]}</h3>
                <p style={{ color: "var(--text-secondary)" }}>Sélectionnez la réponse qui vous correspond le mieux.</p>

                <div className="options">
                  <button className="option-btn">Option A - Profil 1</button>
                  <button className="option-btn">Option B - Profil 2</button>
                  <button className="option-btn">Option C - Profil 3</button>
                </div>

                <div className="bottom-actions">
                  <Button variant="secondary" onClick={() => setCurrentQuestion(Math.max(0, currentQuestion - 1))}>Précédent</Button>
                  <Button fullWidth onClick={() => setCurrentQuestion(Math.min(3, currentQuestion + 1))}>Suivant</Button>
                </div>
              </div>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<AuditApp />, document.getElementById('root'));
  </script>
</body>
</html>
