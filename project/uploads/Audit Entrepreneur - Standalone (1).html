document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html lang=\"fr\"><head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>Audit Entrepreneur | PERSONA BUSINESS LAB<\u002Ftitle>\n  \n  <style>\n    * { box-sizing: border-box; margin: 0; padding: 0; }\n    :root { color-scheme: light dark; }\n    \n    body {\n      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', sans-serif;\n      background: #1a1a1a !important;\n      color: white !important;\n      min-height: 100vh;\n      transition: background 0.3s, color 0.3s;\n      filter: invert(0);\n    }\n\n    body * {\n      color: white !important;\n      background-color: inherit;\n    }\n\n    .wrap {\n      max-width: 600px;\n      margin: 0 auto;\n      padding: 3rem 1.5rem;\n    }\n\n    .screen {\n      display: none;\n      opacity: 0;\n      transform: translateY(10px);\n      transition: opacity 0.4s ease, transform 0.4s ease;\n    ; color: white; }\n\n    .screen.active {\n      display: block;\n      opacity: 1;\n      transform: translateY(0);\n    }\n\n    /* Brand & Headers */\n    .brand {\n      font-size: 10px;\n      letter-spacing: 0.14em;\n      text-transform: uppercase;\n      \n      margin-bottom: 1rem;\n    ; color: white; }\n\n    h1 {\n      font-size: 28px;\n      font-weight: 600;\n      line-height: 1.2;\n      margin-bottom: 0.75rem;\n      color: white !important;\n    }\n\n    .subtitle {\n      font-size: 15px;\n      color: white !important;\n      line-height: 1.7;\n      margin-bottom: 2rem;\n    }\n\n    .audit-focus {\n      display: inline-flex;\n      align-items: center;\n      gap: 6px;\n      font-size: 11px;\n      font-weight: 600;\n      letter-spacing: 0.08em;\n      text-transform: uppercase;\n      color: #d4af37;\n      background: rgba(250, 245, 212, 0.08);\n      border: 1px solid rgba(250, 245, 212, 0.2);\n      border-radius: 20px;\n      padding: 4px 12px;\n      margin-bottom: 1.25rem;\n    }\n\n    body.dark-mode .audit-focus {\n      color: #4a9fff;\n      background: rgba(74, 159, 255, 0.1);\n      border-color: rgba(74, 159, 255, 0.25);\n    }\n\n    .audit-intro {\n      font-size: 14px;\n      color: white !important;\n      line-height: 1.7;\n      margin-bottom: 2rem;\n    }\n\n    body.dark-mode .audit-intro { color: white !important; }\n\n    .divider {\n      height: 1px;\n      background: #e8e8e8;\n      margin: 2rem 0;\n    }\n\n    /* Points */\n    .points {\n      display: flex;\n      flex-direction: column;\n      gap: 12px;\n      margin-bottom: 2.5rem;\n    }\n\n    .point {\n      display: flex;\n      align-items: flex-start;\n      gap: 12px;\n      font-size: 14px;\n      color: white !important;\n      line-height: 1.6;\n    }\n\n    .point-num {\n      font-size: 11px;\n      font-weight: 500;\n      color: white !important;\n      min-width: 18px;\n      padding-top: 2px;\n    }\n\n    /* Progress */\n    .progress-wrap {\n      margin-bottom: 2rem;\n    }\n\n    .progress-track {\n      height: 2px;\n      background: #e8e8e8;\n      border-radius: 1px;\n    }\n\n    .progress-fill {\n      height: 2px;\n      background: #c9a961;\n      border-radius: 1px;\n      transition: width 0.3s ease;\n    }\n\n    .progress-meta {\n      display: flex;\n      justify-content: space-between;\n      margin-top: 8px;\n      font-size: 11px;\n      color: white !important;\n    }\n\n    /* Question */\n    .question {\n      font-size: 16px;\n      font-weight: 500;\n      \n      line-height: 1.6;\n      margin-bottom: 0.5rem;\n    ; color: white; }\n\n    .question-context {\n      font-size: 13px;\n      color: #333 !important;\n      line-height: 1.5;\n      margin-bottom: 1.5rem;\n      padding: 12px 14px;\n      background: #f7f7f7;\n      border-left: 3px solid #d4af37;\n      border-radius: 4px;\n    }\n\n    /* Options */\n    .options { \n      color: black !important;\n      display: flex;\n      flex-direction: column;\n      gap: 8px;\n      margin-bottom: 2rem;\n      pointer-events: auto;\n      z-index: 20;\n      position: relative;\n    }\n\n    .option {\n      padding: 14px 16px;\n      border: 1px solid #e8e8e8;\n      border-radius: 10px;\n      cursor: pointer;\n      font-size: 14px;\n      color: black !important;\n      line-height: 1.5;\n      background: #ffffff !important;\n      transition: all 0.2s;\n      display: flex;\n      pointer-events: auto;\n      z-index: 10;\n      position: relative;\n      align-items: center;\n      justify-content: space-between;\n      gap: 12px;\n    }\n\n    .option:hover {\n      border-color: #4a7fff;\n      background: #f0f4ff;\n      color: black !important;\n      transform: translateX(4px);\n    }\n\n    .option.selected {\n      border-color: #4a7fff;\n      background: #4a7fff;\n      color: white !important;\n      font-weight: 600;\n    }\n\n    /* FORCE TEXT COLOR IN OPTIONS */\n    .option span { color: black !important; display: block; }\n    .option { color: black !important; }\n\n    .option-help {\n      display: inline-block;\n      width: 16px;\n      height: 16px;\n      background: #999;\n      color: white !important;\n      border-radius: 50%;\n      text-align: center;\n      line-height: 16px;\n      font-size: 11px;\n      font-weight: 600;\n      cursor: help;\n      position: relative;\n      flex-shrink: 0;\n    }\n\n    .option-help:hover::after {\n      content: attr(data-tooltip);\n      position: absolute;\n      bottom: 125%;\n      left: 50%;\n      transform: translateX(-50%);\n      background: #d4af37;\n      color: white !important;\n      padding: 8px 12px;\n      border-radius: 4px;\n      font-size: 12px;\n      font-weight: 400;\n      white-space: nowrap;\n      z-index: 1000;\n      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);\n    }\n\n    @keyframes slideIn {\n      from { opacity: 0; transform: translateY(10px); }\n      to { opacity: 1; transform: translateY(0); }\n    }\n\n    .nav {\n      di  margin-bottom: 2px; }\n    body.dark-mode .phase-item strong { color: #ff8fb3; }\n\n    .nav-full { display: flex; gap: 8px; margin-top: 2.5rem; flex-wrap: wrap; }\n    .nav-full .btn { flex: 1 1 auto; }\n\n    /* ===== TARIF DE LANCEMENT ===== */\n    .price-launch-badge {\n      display: inline-block;\n      font-size: 12px;\n      font-weight: 600;\n      color: #ff9966;\n      background: linear-gradient(135deg, rgba(255, 153, 51, 0.12), rgba(255, 102, 51, 0.12));\n      border: 1px solid rgba(255, 102, 51, 0.25);\n      padding: 6px 14px;\n      border-radius: 20px;\n      margin-bottom: 12px;\n      animation: pulse-soft 2.4s ease-in-out infinite;\n    }\n    body.dark-mode .price-launch-badge {\n      color: #ff9966;\n      background: linear-gradient(135deg, rgba(255, 153, 102, 0.1), rgba(255, 102, 51, 0.1));\n      border-color: rgba(255, 153, 102, 0.25);\n    }\n    @keyframes pulse-soft {\n      0%, 100% { transform: scale(1); }\n      50% { transform: scale(1.02); }\n    }\n    .price-strike {\n      text-decoration: line-through;\n      opacity: 0.55;\n      font-weight: 400;\n      margin-left: 6px;\n      font-size: 0.85em;\n    }\n\n    @media (max-width: 600px) {\n      .wrap { padding: 2rem 1rem; }\n      h1 { font-size: 24px; }\n      .sphere-container { width: 120px; height: 120px; }\n      .result-name { font-size: 24px; }\n      .axis-name { font-size: 18px; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n<body class=\"dark-mode\">\n\n  <div class=\"wrap\">\n    <!-- MODE CORRECTION -->\n    <div class=\"screen\" id=\"screen-correction-mode\">\n      <div class=\"brand\">PERSONA BUSINESS LAB<\u002Fdiv>\n      <h1>Mode Correction<\u002Fh1>\n      <p style=\"font-size: 15px; color: white; margin: 2rem 0; line-height: 1.6;\">Choisissez un archétype pour tester les résultats et les recommandations sans refaire l'audit complet.<\u002Fp>\n      \n      <div style=\"display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 2rem 0;\">\n        <button class=\"form-pill\" onclick=\"auditApp.loadCorrectionArchetype('Le Pionnier')\" style=\"padding: 12px; border: 2px solid #4a7fff; background: transparent; color: white; border-radius: 8px; cursor: pointer;\">Le Pionnier<\u002Fbutton>\n        <button class=\"form-pill\" onclick=\"auditApp.loadCorrectionArchetype('L\\'Architecte')\" style=\"padding: 12px; border: 2px solid #4a7fff; background: transparent; color: white; border-radius: 8px; cursor: pointer;\">L'Architecte<\u002Fbutton>\n        <button class=\"form-pill\" onclick=\"auditApp.loadCorrectionArchetype('Le Porteur')\" style=\"padding: 12px; border: 2px solid #4a7fff; background: transparent; color: white; border-radius: 8px; cursor: pointer;\">Le Porteur<\u002Fbutton>\n        <button class=\"form-pill\" onclick=\"auditApp.loadCorrectionArchetype('Le Bâtisseur')\" style=\"padding: 12px; border: 2px solid #4a7fff; background: transparent; color: white; border-radius: 8px; cursor: pointer;\">Le Bâtisseur<\u002Fbutton>\n        <button class=\"form-pill\" onclick=\"auditApp.loadCorrectionArchetype('Le Stratège')\" style=\"padding: 12px; border: 2px solid #4a7fff; background: transparent; color: white; border-radius: 8px; cursor: pointer;\">Le Stratège<\u002Fbutton>\n      <\u002Fdiv>\n      \n      <button class=\"btn btn-primary btn-full\" onclick=\"auditApp.showScreen('screen-intro')\" style=\"margin-top: 2rem;\">Retour à l'audit normal<\u002Fbutton>\n    <\u002Fdiv>\n\n    <!-- INTRO -->\n    <div class=\"screen active\" id=\"screen-intro\">\n      <div class=\"brand\">PERSONA BUSINESS LAB<\u002Fdiv>\n      <h1>Audit entrepreneur solo &amp; TPE<\u002Fh1>\n      <p class=\"subtitle\">Identifie ton archétype et ton axe prioritaire. Gratuit, 10 minutes.<\u002Fp>\n      <p class=\"audit-focus\">Axé organisation et structure<\u002Fp>\n      <p class=\"audit-intro\">Entre les clients, l'admin et tout le reste, difficile de prendre du recul. Tu sais ce que tu fais, mais sais-tu ce qui te coûte le plus ?<\u002Fp>\n      <div class=\"divider\"><\u002Fdiv>\n      <div class=\"points\">\n        <div class=\"point\"><span class=\"point-num\">01<\u002Fspan><span>39 questions structurées en 10 thèmes clés<\u002Fspan><\u002Fdiv>\n        <div class=\"point\"><span class=\"point-num\">02<\u002Fspan><span>Un archétype personnel parmi 5 profils<\u002Fspan><\u002Fdiv>\n        <div class=\"point\"><span class=\"point-num\">03<\u002Fspan><span>Ton axe prioritaire identifié automatiquement<\u002Fspan><\u002Fdiv>\n        <div class=\"point\"><span class=\"point-num\">04<\u002Fspan><span>Bilan détaillé optionnel de 3 à 6 pages<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"archetypes-row\">\n        <span class=\"archetype-chip\">Le Pionnier<\u002Fspan>\n        <span class=\"archetype-chip\">L'Architecte<\u002Fspan>\n        <span class=\"archetype-chip\">Le Porteur<\u002Fspan>\n        <span class=\"archetype-chip\">Le Bâtisseur<\u002Fspan>\n        <span class=\"archetype-chip\">Le Stratège<\u002Fspan>\n      <\u002Fdiv>\n      <button class=\"btn btn-primary btn-full\" onclick=\"auditApp.goToOnboarding()\">Démarrer mon audit<\u002Fbutton>\n      <button class=\"btn\" onclick=\"auditApp.showScreen('screen-correction-mode')\" style=\"background: #555; border-color: #777; margin-top: 12px;\">Mode correction (dev)<\u002Fbutton>\n      <p class=\"start-footer\">Aucune inscription requise, juste 10 minutes pour te connaître.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- ONBOARDING (Rubrique 0) -->\n    <div class=\"screen\" id=\"screen-onboarding\">\n      <div class=\"brand\">Avant de commencer<\u002Fdiv>\n      <h1>Faisons connaissance<\u002Fh1>\n      <p class=\"subtitle\">Trois infos rapides pour personnaliser tes recommandations bien-être à la fin de l'audit. Ces données restent sur ton appareil.<\u002Fp>\n\n      <div class=\"form-block\">\n        <label class=\"form-label\" for=\"user-prenom\">Ton prénom<\u002Flabel>\n        <input type=\"text\" id=\"user-prenom\" class=\"form-input\" placeholder=\"Ex. Camille\" autocomplete=\"given-name\">\n      <\u002Fdiv>\n\n      <div class=\"form-block\">\n        <div class=\"form-label\">Ton statut<\u002Fdiv>\n        <div class=\"form-options\" id=\"form-statut\">\n          <button type=\"button\" class=\"form-pill\" data-value=\"auto-entrepreneur\">Auto-entrepreneur·e<\u002Fbutton>\n          <button type=\"button\" class=\"form-pill\" data-value=\"tpe\">TPE<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"form-block\">\n        <label class=\"form-label\" for=\"user-metier\">Ton métier ou secteur d'activité<\u002Flabel>\n        <input type=\"text\" id=\"user-metier\" class=\"form-input\" placeholder=\"Ex. Consultant en marketing\" autocomplete=\"off\">\n      <\u002Fdiv>\n\n      <div class=\"form-block\" id=\"form-fonction-block\" style=\"display: none;\">\n        <label class=\"form-label\" for=\"user-fonction\">Ta fonction dans la structure<\u002Flabel>\n        <input type=\"text\" id=\"user-fonction\" class=\"form-input\" placeholder=\"Ex. Dirigeante, responsable marketing\" autocomplete=\"off\">\n      <\u002Fdiv>\n\n      <div class=\"form-block\">\n        <div class=\"form-label\">Tu es<\u002Fdiv>\n        <div class=\"form-options\" id=\"form-sexe\">\n          <button type=\"button\" class=\"form-pill\" data-value=\"femme\">Femme<\u002Fbutton>\n          <button type=\"button\" class=\"form-pill\" data-value=\"homme\">Homme<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"form-block\">\n        <div class=\"form-label\">Ta tranche d'âge<\u002Fdiv>\n        <div class=\"form-options\" id=\"form-age\">\n          <button type=\"button\" class=\"form-pill\" data-value=\"18-35\">18 – 35 ans<\u002Fbutton>\n          <button type=\"button\" class=\"form-pill\" data-value=\"35-40\">35 – 40 ans<\u002Fbutton>\n          <button type=\"button\" class=\"form-pill\" data-value=\"40-50\">40 – 50 ans<\u002Fbutton>\n          <button type=\"button\" class=\"form-pill\" data-value=\"50+\">50 ans et plus<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"form-note\">Pourquoi ces infos ? Le cycle menstruel, la périménopause, la ménopause ou la post-ménopause changent profondément l'énergie disponible, donc les bonnes habitudes à mettre en place. Côté hommes, la gestion du cortisol et de la testostérone influencent aussi tes recommandations. On adapte le contenu de fin d'audit à ta réalité.<\u002Fp>\n\n      <div class=\"nav\">\n        <button class=\"btn\" onclick=\"auditApp.showScreen('screen-intro')\">← Retour<\u002Fbutton>\n        <button class=\"btn btn-primary\" id=\"btn-start-quiz\" onclick=\"auditApp.startAudit()\" disabled=\"\">Commencer le questionnaire<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- QUESTIONS -->\n    <div class=\"screen\" id=\"screen-questions\">\n      <div class=\"progress-wrap\">\n        <div class=\"progress-track\"><div class=\"progress-fill\" id=\"progress\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"progress-meta\">\n          <span id=\"theme-label\"><\u002Fspan>\n          <span id=\"counter\"><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"question\" id=\"question-text\"><\u002Fdiv>\n      <div class=\"question-context\" id=\"question-context\" style=\"display:none;\"><\u002Fdiv>\n      <div class=\"options\" id=\"options\"><\u002Fdiv>\n      <div class=\"nav\">\n        <button class=\"btn\" onclick=\"auditApp.previousQuestion()\" id=\"btn-prev\" style=\"display:none;\">← Retour<\u002Fbutton>\n        <button class=\"btn btn-primary\" id=\"btn-next\" onclick=\"auditApp.nextQuestion()\" disabled=\"\" style=\"pointer-events: auto; z-index: 30; position: relative;\">Suivant<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RESULT -->\n    <div class=\"screen\" id=\"screen-result\">\n      <div class=\"brand\">PERSONA BUSINESS LAB<\u002Fdiv>\n      <h1>Ton résultat<\u002Fh1>\n      <p class=\"subtitle\" id=\"result-intro\"><\u002Fp>\n      \n      <div class=\"sphere-container\"><div class=\"sphere\" id=\"result-sphere\"><\u002Fdiv><\u002Fdiv>\n\n      <div class=\"result-block\">\n        <div class=\"result-label\">Ton archétype<\u002Fdiv>\n        <div class=\"result-name\" id=\"result-name\"><\u002Fdiv>\n        <div class=\"result-desc\" id=\"result-desc\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"axis-block\">\n        <div class=\"axis-label\">Ton axe prioritaire<\u002Fdiv>\n        <div class=\"axis-name\" id=\"axis-name\"><\u002Fdiv>\n        <div class=\"axis-desc\" id=\"axis-desc\">Tu ne prospectes pas ou c'est difficile pour toi. Trouver des clients est une compétence qui s'aligne avec ta façon d'être.<\u002Fdiv>\n        <div class=\"axis-bars-header\">Scores détaillés par thème<\u002Fdiv>\n        <div class=\"axis-bars\" id=\"axis-bars\"><\u002Fdiv>\n        <div class=\"axis-legend\">💡 Plus la barre est courte, plus c'est une opportunité pour toi d'améliorer cet axe.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"share-buttons\">\n        <button class=\"share-btn\" onclick=\"auditApp.shareTwitter()\">𝕏 Partager<\u002Fbutton>\n        <button class=\"share-btn\" onclick=\"auditApp.shareLinkedIn()\">in Partager<\u002Fbutton>\n        <button class=\"share-btn\" onclick=\"auditApp.shareInstagram()\">📸 Instagram<\u002Fbutton>\n        <button class=\"share-btn\" onclick=\"auditApp.shareFacebook()\">f Facebook<\u002Fbutton>\n        <button class=\"share-btn\" onclick=\"auditApp.exportPDF()\">📥 PDF<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"next-section\">\n        <div class=\"next-section-title\">Et ton bien-être dans tout ça ?<\u002Fdiv>\n        <div class=\"next-section-desc\">Ton archétype dit beaucoup de comment tu travailles, mais il influence aussi comment tu te sens. Découvre les habitudes santé adaptées à ton profil.<\u002Fdiv>\n        \n        <!-- Aperçu bien-être -->\n        <div id=\"wellbeing-preview\" style=\"margin: 2rem 0; padding: 1.5rem; background: transparent; border-radius: 12px; border-left: none;\">\n          <div id=\"wellbeing-preview-content\" style=\"font-size: 14px; color: white !important; line-height: 1.6;\"><\u002Fdiv>\n          <div style=\"margin-top: 1rem; font-size: 12px; color: white !important; font-style: italic;\">Aperçu de tes recommandations santé — accès complet après déblocage<\u002Fdiv>\n        <\u002Fdiv>\n        \n        <button class=\"btn btn-primary btn-full\" onclick=\"auditApp.goToPaywall()\">Voir mes recommandations santé →<\u002Fbutton>\n      <\u002Fdiv>\n\n      <!-- Mention partage réseau social (partie gratuite) -->\n      <div style=\"margin-top: 3rem; padding: 2rem; background: rgba(250, 245, 212, 0.05); border-radius: 12px; text-align: center;\">\n        <p style=\"font-size: 14px; color: white !important; line-height: 1.6;\">Tu peux partager ton profil sur les réseaux sociaux. Les boutons de partage sont disponibles sur ton écran de résultats.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Envoi automatique des résultats par mail -->\n      <div style=\"margin-top: 3rem; padding: 2rem; background: rgba(100, 200, 255, 0.08); border-radius: 12px; border: 1px solid rgba(250, 245, 212, 0.2);\">\n        <div style=\"font-size: 16px; font-weight: 600; color: white !important; margin-bottom: 1rem;\">Reçois tes résultats par mail<\u002Fdiv>\n        <div style=\"display: flex; gap: 12px; margin-bottom: 1rem;\">\n          <input type=\"email\" id=\"result-email\" placeholder=\"ton@email.com\" style=\"flex: 1; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; background: white; color: black !important; color: black !important;\">\n          <button class=\"btn btn-primary\" onclick=\"auditApp.sendResultsByEmail()\" style=\"white-space: nowrap;\">Envoyer<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"font-size: 12px; color: white !important; margin: 0;\">Nous ne partagerons jamais ton email. Promis.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"cta-block\">\n        <div class=\"cta-title\">Tu veux aller plus loin ?<\u002Fdiv>\n        <div class=\"cta-desc\">Un bilan personnalisé avec tes points forts et tes axes de progression, livré en 5 à 7 jours.<\u002Fdiv>\n        <div class=\"cta-buttons\" id=\"cta-buttons-static\">\n          <!-- Rendu dynamique par renderPriceCTA() au chargement de la page -->\n          <div class=\"cta-sep\">ou<\u002Fdiv>\n          <button class=\"btn-outline-full\" onclick=\"auditApp.goToAppel()\">Un appel gratuit pour discuter<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"margin-top: 2rem; text-align: center;\">\n          <a href=\"[lien audit complet]\" style=\"display: inline-block; padding: 14px 32px; background: #d4af37; color: white; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; transition: all 0.2s;\" onmouseover=\"this.style.background='#0077cc'\" onmouseout=\"this.style.background='#d4af37'\">Découvrir l'audit complet<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Rubrique 1 : santé et habitudes (aperçu gratuit) -->\n    <div class=\"screen\" id=\"screen-health\">\n      <div class=\"brand\">Rubrique bien-être · Aperçu gratuit<\u002Fdiv>\n      <h1 id=\"health-title\">Santé et habitudes<\u002Fh1>\n      <p class=\"subtitle\" id=\"health-intro\"><\u002Fp>\n\n      <div class=\"health-content\" id=\"health-content\"><\u002Fdiv>\n\n      <div style=\"margin: 2rem 0; padding: 2rem; background: rgba(250, 245, 212, 0.05); border-radius: 12px;\">\n        <p style=\"font-size: 14px; color: white !important; line-height: 1.6;\">Ce n'est qu'un aperçu. Ton bilan complet détaille chaque axe de ton profil et t'explique exactement quoi mettre en place, selon qui tu es.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"share-buttons\">\n        <button class=\"share-btn\" onclick=\"auditApp.shareHealthTwitter()\">𝕏 Partager<\u002Fbutton>\n        <button class=\"share-btn\" onclick=\"auditApp.shareHealthLinkedIn()\">in Partager<\u002Fbutton>\n        <button class=\"share-btn\" onclick=\"auditApp.exportHealthPDF()\">📥 PDF<\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"nav-full\">\n        <button class=\"btn\" onclick=\"auditApp.backToResult()\">← Retour au résultat<\u002Fbutton>\n        <button class=\"btn btn-primary\" onclick=\"auditApp.goToPaywall()\">Voir mon bilan complet →<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Écran paywall : accès conditionnel santé et bien-être -->\n    <div class=\"screen\" id=\"screen-paywall\">\n      <div class=\"brand\">Accès aux recommandations santé<\u002Fdiv>\n      <h1>La suite de ton bilan<\u002Fh1>\n      <p class=\"subtitle\">Les recommandations santé et bien-être adaptées à ton profil font partie de l'audit complet.<\u002Fp>\n      \n      <div style=\"margin: 2rem 0; padding: 2rem; background: transparent; border: none; border-radius: 12px;\">\n        <h3 style=\"font-size: 18px; font-weight: 600; color: white !important; margin-bottom: 1rem;\">Qu'est-ce que tu vas découvrir ?<\u002Fh3>\n        <div style=\"display: flex; flex-direction: column; gap: 1rem; font-size: 14px; color: white !important; line-height: 1.6;\">\n          <div style=\"display: flex; gap: 12px;\">\n            <span style=\"min-width: 20px;\">✓<\u002Fspan>\n            <span><strong>Santé et habitudes<\u002Fstrong> : les signaux à surveiller pour toi, tes habitudes clés à installer, les soutiens naturels adaptés à ton profil.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display: flex; gap: 12px;\">\n            <span style=\"min-width: 20px;\">✓<\u002Fspan>\n            <span><strong>Bien-être selon ta phase de vie<\u002Fstrong> : si tu es femme, les spécificités de ta phase (cycle, périménopause, ménopause), si tu es homme, l'équilibre hormonal qui s'adapte à ton âge.<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"displ
