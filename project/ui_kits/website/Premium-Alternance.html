<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concierge Business - Premium</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYyWkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    body { margin: 0; padding: 0; }
    * { box-sizing: border-box; }
    
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-6);
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border-primary);
      position: sticky;
      top: 0;
      z-index: var(--z-sticky);
    }
    .logo {
      font-size: var(--font-size-h3);
      font-weight: 700;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }
    .logo-accent { color: var(--color-gold); }
    .nav-links {
      display: flex;
      gap: var(--space-6);
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .nav-links a {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      transition: color var(--transition-base);
    }
    .nav-links a:hover { color: var(--accent-primary); }
    
    /* Alternating Sections */
    .section {
      padding: var(--space-20);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .section.dark {
      background: var(--color-black);
      color: var(--text-inverse);
    }
    
    .section.light {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    
    .section-accent {
      display: inline-block;
      width: 48px;
      height: 2px;
      background: var(--color-gold);
      margin-bottom: var(--space-6);
    }
    
    .section h2 {
      font-size: var(--font-size-display-2);
      margin: 0 0 var(--space-4) 0;
      letter-spacing: -0.02em;
      font-weight: 700;
    }
    
    .section p {
      font-size: var(--font-size-lg);
      max-width: 600px;
      margin-bottom: var(--space-8);
      line-height: 1.7;
      text-align: center;
    }
    
    .section.dark p {
      color: rgba(255, 255, 255, 0.85);
    }
    
    .cta-buttons {
      display: flex;
      gap: var(--space-4);
      justify-content: center;
      flex-wrap: wrap;
    }
    
    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: var(--space-8);
      width: 100%;
      max-width: 1200px;
    }
    
    .feature-card {
      padding: var(--space-8);
      border-radius: var(--radius-lg);
      position: relative;
      overflow: hidden;
    }
    
    .section.dark .feature-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-inverse);
    }
    
    .section.light .feature-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      color: var(--text-primary);
    }
    
    .feature-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--color-gold);
    }
    
    .feature-icon {
      font-size: 2.5rem;
      margin-bottom: var(--space-4);
    }
    
    .feature-card h3 {
      margin: var(--space-4) 0 var(--space-3) 0;
      font-weight: 700;
    }
    
    .feature-card p {
      font-size: var(--font-size-sm);
      margin: 0;
      line-height: 1.6;
    }
    
    .pricing-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--space-8);
      max-width: 1000px;
      width: 100%;
    }
    
    .pricing-card {
      padding: var(--space-8);
      border-radius: var(--radius-lg);
      position: relative;
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    
    .section.dark .pricing-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-inverse);
    }
    
    .section.light .pricing-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-primary);
      color: var(--text-primary);
    }
    
    .pricing-card.featured {
      border: 2px solid var(--color-gold);
      transform: scale(1.05);
    }
    
    .pricing-card.featured::before {
      content: '';
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      width: 100px;
      height: 2px;
      background: var(--color-gold);
    }
    
    .price {
      font-size: var(--font-size-display-2);
      font-weight: 700;
      color: var(--accent-primary);
      margin: var(--space-4) 0;
    }
    
    .footer {
      background: var(--color-black);
      color: var(--text-inverse);
      padding: var(--space-12);
      text-align: center;
      font-size: var(--font-size-sm);
      border-top: 2px solid var(--color-gold);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Badge } = window.DesignSystem_776417;

    function MarketingSite() {
      return (
        <div>
          <nav className="navbar">
            <div className="logo">CONCIERGE<span className="logo-accent">.</span></div>
            <ul className="nav-links">
              <li><a href="#features">Fonctionnalités</a></li>
              <li><a href="#pricing">Tarifs</a></li>
              <li><Button size="sm">Connexion</Button></li>
            </ul>
          </nav>

          <section className="section dark">
            <div className="section-accent"></div>
            <h2>Audit Business<br/>Personnalisé</h2>
            <p>Diagnostic détaillé adapté à votre profil entrepreneurial. Plan d'action concret et mesurable pour votre croissance.</p>
            <div className="cta-buttons">
              <Button size="lg">Commencer l'Audit</Button>
              <Button variant="secondary" size="lg">En savoir plus</Button>
            </div>
          </section>

          <section className="section light" id="features">
            <div className="section-accent"></div>
            <h2>Ce que vous obtenez</h2>
            <div className="features-grid">
              <div className="feature-card">
                <div className="feature-icon">📊</div>
                <h3>Analyse Détaillée</h3>
                <p>Diagnostic complet basé sur votre personnalité et vos besoins business.</p>
              </div>
              <div className="feature-card">
                <div className="feature-icon">🎯</div>
                <h3>Plan d'Action</h3>
                <p>Recommandations précises et mesurables pour votre entreprise.</p>
              </div>
              <div className="feature-card">
                <div className="feature-icon">👥</div>
                <h3>Accompagnement</h3>
                <p>Option conseil 1-to-1 avec nos experts pour implémenter.</p>
              </div>
              <div className="feature-card">
                <div className="feature-icon">📱</div>
                <h3>App Mobile</h3>
                <p>Suivi de votre progression et accès à vos résultats.</p>
              </div>
            </div>
          </section>

          <section className="section dark" id="pricing">
            <h2>Nos Tarifs</h2>
            <div className="pricing-grid">
              <div className="pricing-card">
                <Badge>Starter</Badge>
                <h3>Audit Seul</h3>
                <div className="price">€199</div>
                <p>Audit détaillé et rapport complet</p>
                <Button fullWidth variant="secondary">Choisir</Button>
              </div>

              <div className="pricing-card featured">
                <Badge variant="primary">Populaire</Badge>
                <h3>Audit + Conseil</h3>
                <div className="price">€499</div>
                <p>Audit + 3 sessions de conseil 1-to-1</p>
                <Button fullWidth>Choisir</Button>
              </div>

              <div className="pricing-card">
                <Badge variant="success">Premium</Badge>
                <h3>Audit + Premium</h3>
                <div className="price">€999</div>
                <p>Audit + 6 sessions + app mobile + support</p>
                <Button fullWidth variant="secondary">Choisir</Button>
              </div>
            </div>
          </section>

        <footer className="footer">
            <p>&copy; 2024 Persona Business Lab. Tous droits réservés.</p>
            <p style={{ fontSize: "11px", color: "rgba(255,255,255,0.6)", marginTop: "0.5rem", fontStyle: "italic" }}>by Aurore S</p>
          </footer>
        </div>
      );
    }

    ReactDOM.render(<MarketingSite />, document.getElementById('root'));
  </script>
</body>
</html>
