<!-- @dsCard group="Spacing" viewport="700x300" name="Spacing Scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spacing Scale</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      padding: 2rem;
      background: var(--bg-primary);
    }
    .spacing-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .spacing-visual {
      background: var(--accent-primary);
      border-radius: var(--radius-sm);
      min-width: 20px;
      height: 24px;
    }
    .spacing-label {
      font-size: var(--font-size-sm);
      color: var(--text-secondary);
      min-width: 80px;
    }
  </style>
</head>
<body>
  <div class="spacing-row">
    <div class="spacing-label">4px</div>
    <div class="spacing-visual" style="width: calc(4px * 2);"></div>
  </div>
  <div class="spacing-row">
    <div class="spacing-label">8px</div>
    <div class="spacing-visual" style="width: calc(8px * 2);"></div>
  </div>
  <div class="spacing-row">
    <div class="spacing-label">16px</div>
    <div class="spacing-visual" style="width: calc(16px * 2);"></div>
  </div>
  <div class="spacing-row">
    <div class="spacing-label">24px</div>
    <div class="spacing-visual" style="width: calc(24px * 2);"></div>
  </div>
  <div class="spacing-row">
    <div class="spacing-label">32px</div>
    <div class="spacing-visual" style="width: calc(32px * 2);"></div>
  </div>
  <div class="spacing-row">
    <div class="spacing-label">48px</div>
    <div class="spacing-visual" style="width: calc(48px * 2);"></div>
  </div>
</body>
</html>
