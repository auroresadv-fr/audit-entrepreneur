<!-- @dsCard group="Type" viewport="700x400" name="Headlines & Display" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Typography - Headlines</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    body {
      padding: 2rem;
      background: var(--bg-primary);
    }
    .type-sample {
      margin-bottom: 1.5rem;
    }
    .type-label {
      font-size: var(--font-size-xs);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide);
      margin-bottom: 0.5rem;
    }
    .display-1 { font-size: var(--font-size-display-1); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); }
    .display-2 { font-size: var(--font-size-display-2); font-weight: var(--font-weight-bold); line-height: var(--line-height-tight); }
    .h1 { font-size: var(--font-size-h1); font-weight: var(--font-weight-bold); line-height: var(--line-height-normal); }
    .h2 { font-size: var(--font-size-h2); font-weight: var(--font-weight-bold); line-height: var(--line-height-normal); }
    .h3 { font-size: var(--font-size-h3); font-weight: var(--font-weight-semibold); line-height: var(--line-height-normal); }
  </style>
</head>
<body>
  <div class="type-sample">
    <div class="type-label">Display 1 (56px Bold)</div>
    <div class="display-1">Bienvenue à Concierge</div>
  </div>

  <div class="type-sample">
    <div class="type-label">Display 2 (44px Bold)</div>
    <div class="display-2">Audit Business Personnalisé</div>
  </div>

  <div class="type-sample">
    <div class="type-label">Heading 1 (32px Bold)</div>
    <div class="h1">Votre stratégie sur mesure</div>
  </div>

  <div class="type-sample">
    <div class="type-label">Heading 2 (28px Bold)</div>
    <div class="h2">Commencer votre audit maintenant</div>
  </div>

  <div class="type-sample">
    <div class="type-label">Heading 3 (24px Semibold)</div>
    <div class="h3">Résultats détaillés et actions</div>
  </div>
</body>
</html>
