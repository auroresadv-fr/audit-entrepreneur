<!-- @dsCard group="Components" viewport="700x350" name="Badges & Status" -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Component</title>
  <link rel="stylesheet" href="../../styles.css">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYyWkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <style>
    body {
      padding: 2rem;
      background: var(--bg-primary);
    }
    .demo-section {
      margin-bottom: 2rem;
    }
    .demo-title {
      font-size: var(--font-size-sm);
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: var(--letter-spacing-wide);
      margin-bottom: 1rem;
      font-weight: var(--font-weight-semibold);
    }
    .badge-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Badge } = window.DesignSystem_776417;

    function BadgeDemo() {
      return (
        <div>
          <div className="demo-section">
            <div className="demo-title">Primary Variant - All Sizes</div>
            <div className="badge-row">
              <Badge size="sm">Small</Badge>
              <Badge size="md">Medium</Badge>
              <Badge size="lg">Large</Badge>
            </div>
          </div>

          <div className="demo-section">
            <div className="demo-title">Success - Audit Complete</div>
            <div className="badge-row">
              <Badge variant="success" size="sm">✓ Completed</Badge>
              <Badge variant="success" size="md">✓ Completed</Badge>
              <Badge variant="success" size="lg">✓ Completed</Badge>
            </div>
          </div>

          <div className="demo-section">
            <div className="demo-title">Warning - Action Needed</div>
            <div className="badge-row">
              <Badge variant="warning" size="sm">⚠ Warning</Badge>
              <Badge variant="warning" size="md">⚠ Warning</Badge>
              <Badge variant="warning" size="lg">⚠ Warning</Badge>
            </div>
          </div>

          <div className="demo-section">
            <div className="demo-title">Error - Failed</div>
            <div className="badge-row">
              <Badge variant="error" size="sm">✕ Error</Badge>
              <Badge variant="error" size="md">✕ Error</Badge>
              <Badge variant="error" size="lg">✕ Error</Badge>
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.render(<BadgeDemo />, document.getElementById('root'));
  </script>
</body>
</html>
